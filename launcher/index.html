<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Syncr Setup</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c14; --card: #13131f; --border: #ffffff0d;
  --accent: #5662f6; --green: #3fb950; --red: #e5534b;
  --text: #e8e8f0; --muted: #6b6b88;
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px; overflow: hidden; user-select: none;
}
.tb {
  display: flex; justify-content: flex-end; align-items: center;
  height: 36px; padding: 0 8px; -webkit-app-region: drag;
}
.tb-btn {
  -webkit-app-region: no-drag;
  width: 28px; height: 28px; border: none; border-radius: 6px;
  background: transparent; color: var(--muted); cursor: pointer;
}
.tb-btn:hover { background: #ffffff0f; color: var(--text); }
.tb-btn.x:hover { background: var(--red); color: #fff; }
.page {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 28px 28px; gap: 20px;
  height: calc(100vh - 36px);
}
.hero { text-align: center; }
.hero-name {
  font-size: 26px; font-weight: 800; letter-spacing: -.5px;
  background: linear-gradient(135deg, #fff 30%, #9ba0ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.panel {
  width: 100%; flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  min-height: 280px;
}
.spinner {
  width: 40px; height: 40px; border: 3px solid #1a1a2a;
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.step-label { font-size: 13px; color: var(--muted); text-align: center; min-height: 20px; }
.progress-track {
  width: 100%; height: 4px; background: #1a1a2a;
  border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%; background: var(--accent);
  border-radius: 99px; transition: width .25s ease;
}
.done-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.3);
  color: var(--green); font-size: 28px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.done-title { font-size: 18px; font-weight: 700; }
.done-lead { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.55; max-width: 320px; }
.done-lead strong { color: var(--text); }
.autostart-toggle {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 12.5px; color: var(--muted); cursor: pointer;
  max-width: 320px; line-height: 1.45; text-align: left;
}
.autostart-toggle input {
  width: 15px; height: 15px; margin-top: 1px;
  accent-color: var(--accent); cursor: pointer; flex: none;
}
.autostart-toggle:hover { color: var(--text); }
.btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
  background: var(--accent); color: #fff; margin-top: auto;
}
.btn:hover { filter: brightness(1.1); }
.error-box { color: var(--red); font-size: 12px; text-align: center; line-height: 1.5; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="tb">
  <button class="tb-btn" id="btn-min">—</button>
  <button class="tb-btn x" id="btn-close">×</button>
</div>
<div class="page">
  <div class="hero">
    <div class="hero-name">Syncr Setup</div>
    <div class="hero-sub">Discord Rich Presence for Firefox</div>
  </div>
  <div class="panel" id="panel">
    <div class="spinner" id="spinner"></div>
    <div class="step-label" id="step-label">Starting…</div>
    <div class="progress-track hidden" id="prog-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="done-icon hidden" id="done-icon">✓</div>
    <div class="done-title hidden" id="done-title">You're all set!</div>
    <div class="done-lead hidden" id="done-lead">
      Click <strong>Add to Firefox</strong> in the window that opened, then open Discord and start browsing.
    </div>
    <label class="autostart-toggle hidden" id="autostart-toggle">
      <input type="checkbox" id="autostart-check" />
      <span>Show the Syncr status icon in my tray on login</span>
    </label>
    <div class="error-box hidden" id="error-box"></div>
    <button class="btn hidden" id="btn-close-app">Close</button>
  </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
