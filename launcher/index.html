<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Syncr</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0c0c14;
  --card:     #13131f;
  --card2:    #1a1a2a;
  --border:   #ffffff0d;
  --accent:   #5662f6;
  --ah:       #6b76ff;
  --green:    #3fb950;
  --yellow:   #d29922;
  --red:      #e5534b;
  --text:     #e8e8f0;
  --muted:    #6b6b88;
  --r:        14px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  overflow: hidden;
  user-select: none;
}

/* ── Titlebar ─────────────────────────────────────────────────────── */
.tb {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  height: 38px;
  padding: 0 10px;
  gap: 4px;
  -webkit-app-region: drag;
}
.tb-btn {
  -webkit-app-region: no-drag;
  width: 30px; height: 30px;
  border-radius: 8px;
  border: none; background: transparent;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.tb-btn:hover { background: #ffffff0f; color: var(--text); }
.tb-btn.x:hover { background: var(--red); color: #fff; }

/* ── Layout ───────────────────────────────────────────────────────── */
.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 32px 28px;
  gap: 20px;
  height: calc(100vh - 38px);
}

/* ── Hero ─────────────────────────────────────────────────────────── */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-top: 12px;
}
.logo-ring {
  position: relative;
  width: 80px; height: 80px;
}
.logo-ring svg.icon {
  position: absolute;
  inset: 0; margin: auto;
  width: 40px; height: 40px;
}
.logo-ring svg.ring {
  width: 80px; height: 80px;
  transform-origin: center;
}
.logo-ring.spin svg.ring { animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.hero-name {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, #9ba0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: -10px;
}

/* ── Status card ──────────────────────────────────────────────────── */
.card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  font-size: 13px;
}
.card-row + .card-row { border-top: 1px solid var(--border); }
.card-row .lbl { color: var(--muted); }
.card-row .val { font-weight: 600; }

.chip {
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.chip-blue   { background: #5662f618; color: #838bff; border: 1px solid #5662f630; }
.chip-green  { background: #3fb95018; color: var(--green); border: 1px solid #3fb95030; }
.chip-yellow { background: #d2992218; color: var(--yellow); border: 1px solid #d2992230; }
.chip-red    { background: #e5534b18; color: var(--red);    border: 1px solid #e5534b30; }

/* ── Progress ─────────────────────────────────────────────────────── */
.progress-box {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: opacity .2s;
}
.progress-box.hidden { opacity: 0; pointer-events: none; }
.progress-track {
  height: 3px;
  background: var(--card2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--ah));
  border-radius: 99px;
  width: 0%;
  transition: width .3s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}

/* ── Action button ────────────────────────────────────────────────── */
.btn {
  width: 100%;
  height: 48px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .02em;
  cursor: pointer;
  transition: filter .15s, transform .1s, opacity .2s;
}
.btn:active:not(:disabled) { transform: scale(.98); }
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover:not(:disabled) { filter: brightness(1.12); }
.btn-primary:disabled {
  background: var(--card2);
  color: var(--muted);
  cursor: default;
}
.btn-done {
  background: #3fb95014;
  color: var(--green);
  border: 1px solid #3fb95028;
  cursor: default;
}

/* ── Log ──────────────────────────────────────────────────────────── */
.log-card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  flex-shrink: 0;
}
.log-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.log-card.open .log-head { border-color: var(--border); }
.chevron { transition: transform .2s; display: flex; }
.log-card.open .chevron { transform: rotate(180deg); }
.log-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
}
.log-card.open .log-body { max-height: 130px; }
.log-scroll {
  height: 130px;
  overflow-y: auto;
  padding: 10px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.log-scroll::-webkit-scrollbar { width: 3px; }
.log-scroll::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 99px; }
.log-line {
  font-family: 'Consolas', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: pre-wrap;
  word-break: break-all;
}
.log-line.err { color: #f07070; }
</style>
</head>
<body>

<!-- Title bar -->
<div class="tb">
  <button class="tb-btn" id="btn-min">
    <svg width="11" height="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="0" y1="1" x2="11" y2="1"/></svg>
  </button>
  <button class="tb-btn x" id="btn-close">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="0" y1="0" x2="11" y2="11"/><line x1="11" y1="0" x2="0" y2="11"/></svg>
  </button>
</div>

<!-- Page -->
<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="logo-ring" id="logo-ring">
      <!-- Spinning ring -->
      <svg class="ring" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="36" stroke="#5662f620" stroke-width="3"/>
        <path d="M40 4 A36 36 0 0 1 76 40" stroke="#5662f6" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <!-- Syncr icon -->
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#5662f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6"/>
        <path d="M2.5 12A10 10 0 0 1 18.3 5.2l3.2 2.8"/>
        <path d="M2.5 22v-6h6"/>
        <path d="M21.5 12A10 10 0 0 1 5.7 18.8l-3.2-2.8"/>
      </svg>
    </div>
    <div class="hero-name">Syncr</div>
    <div class="hero-sub">Discord Rich Presence for Firefox</div>
  </div>

  <!-- Status card -->
  <div class="card">
    <div class="card-row">
      <span class="lbl">Status</span>
      <span class="chip chip-blue" id="status-chip">Checking…</span>
    </div>
    <div class="card-row">
      <span class="lbl">Installed</span>
      <span class="val" id="installed-ver">—</span>
    </div>
    <div class="card-row">
      <span class="lbl">Latest</span>
      <span class="val" id="latest-ver">—</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-box hidden" id="prog-box">
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="progress-text">
      <span id="prog-label">Preparing…</span>
      <span id="prog-pct">0%</span>
    </div>
  </div>

  <!-- Action -->
  <button class="btn btn-primary" id="action-btn" disabled>Checking…</button>

  <!-- Log -->
  <div class="log-card" id="log-card">
    <div class="log-head" id="log-head">
      Activity Log
      <span class="chevron">
        <svg width="12" height="7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 1l5 5 5-5"/></svg>
      </span>
    </div>
    <div class="log-body">
      <div class="log-scroll" id="log-scroll"></div>
    </div>
  </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
